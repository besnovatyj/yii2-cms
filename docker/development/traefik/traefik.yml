# Статическая конфигурация Traefik для локальной разработки.
# API & Dashboard
api:
  dashboard: true
  insecure: true  # TODO: убрать при подготовке production-конфигурации.

# EntryPoints
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

# TLS конфиг из файла
providers:
  file:
    directory: /dynamic
    watch: true
  # Docker provider
  docker:
    endpoint: tcp://socket-proxy:2375
    exposedByDefault: false

# Логи
log:
  level: INFO
#      - "--log.level=DEBUG"

accessLog: {}

# Для контроля контейнера докером
ping: {}
