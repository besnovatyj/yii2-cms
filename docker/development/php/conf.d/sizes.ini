post_max_size = 1024M
upload_max_filesize = 1024M
memory_limit = 1024M
; PHP при каждом `include/require` резолвит путь к файлу: разворачивает симлинки, проверяет '..', получает абсолютный путь. Это дорогая операция (много syscalls к файловой системе).
; realpath_cache_size — это размер кеша, где PHP хранит уже разрезолвленные пути. Без кеша каждый запрос будет заново резолвить одни и те же файлы.
; Дефолтные значения для разработки (для production увеличенные):
realpath_cache_size = 4M      ; размер кеша (дефолт: 4M, раньше был 16K)
realpath_cache_ttl = 120      ; время жизни записи в секундах
